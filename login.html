<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Diamond-Bett | Secure Access</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;}
  body{background:#00000f;display:flex;align-items:center;justify-content:center;
       min-height:100vh;font-family:'Inter',sans-serif;overflow:hidden;}

  canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}

  .panel{position:relative;z-index:10;width:340px;padding:40px 32px 36px;
         background:rgba(10,10,28,0.85);border:1px solid rgba(157,78,221,0.35);
         border-radius:20px;backdrop-filter:blur(20px);
         box-shadow:0 0 60px rgba(157,78,221,0.15),0 0 120px rgba(0,229,255,0.08);}

  .panel::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:1px;
    background:linear-gradient(90deg,transparent,#c77dff,#00e5ff,transparent);}

  /* Orb */
  .orb-wrap{display:flex;justify-content:center;margin-bottom:28px;position:relative;}
  canvas#orb{border-radius:50%;cursor:default;}
  .orb-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
            border-radius:50%;border:1px solid rgba(0,229,255,0.25);pointer-events:none;}

  .title{text-align:center;margin-bottom:24px;}
  .title h1{font-size:15px;font-weight:800;letter-spacing:0.15em;
            background:linear-gradient(135deg,#c77dff,#00e5ff);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .title p{font-size:10px;color:#4a5580;letter-spacing:0.1em;margin-top:4px;}

  /* Input */
  .field{position:relative;margin-bottom:16px;}
  .field input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(157,78,221,0.3);
               color:#e2e4f0;font-size:14px;padding:13px 44px 13px 16px;border-radius:10px;
               outline:none;transition:border-color .2s,box-shadow .2s;
               -webkit-user-select:text;user-select:text;}
  .field input::placeholder{color:#4a5580;}
  .field input:focus{border-color:#00e5ff;box-shadow:0 0 0 3px rgba(0,229,255,0.12);}
  .field.shake{animation:shake .3s ease;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

  .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);
           background:none;border:none;color:#4a5580;cursor:pointer;font-size:13px;padding:4px;}
  .eye-btn:hover{color:#00e5ff;}

  /* Status */
  .status{height:20px;text-align:center;font-size:10px;letter-spacing:0.06em;
          margin-bottom:12px;transition:opacity .3s;}
  .status.ok{color:#00ffb3;} .status.err{color:#ff4d8d;} .status.idle{color:#4a5580;}

  /* Button */
  .login-btn{width:100%;padding:14px;border:none;border-radius:10px;cursor:pointer;
             font-size:13px;font-weight:800;letter-spacing:0.1em;
             background:linear-gradient(135deg,#9d4edd,#6d28d9);color:#fff;
             box-shadow:0 0 20px rgba(157,78,221,0.4);
             transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;}
  .login-btn:hover{transform:translateY(-1px);box-shadow:0 0 32px rgba(157,78,221,0.65);}
  .login-btn:active{transform:scale(0.98);}
  .login-btn .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.2);
                     transform:scale(0);animation:ripple .5s linear;pointer-events:none;}
  @keyframes ripple{to{transform:scale(4);opacity:0;}}

  .footer-note{text-align:center;font-size:9px;color:#2a2a4a;margin-top:20px;letter-spacing:0.08em;}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="panel">
  <div class="orb-wrap">
    <canvas id="orb" width="96" height="96"></canvas>
    <div class="orb-ring" style="width:120px;height:120px;"></div>
    <div class="orb-ring" style="width:148px;height:148px;opacity:0.4;"></div>
  </div>

  <div class="title">
    <h1>NEURAL SECURITY</h1>
    <p>DIAMOND-BETT ADMIN PANEL</p>
  </div>

    <div class="field" id="email-field">
    <input type="email" id="email-input" placeholder="Admin Email ထည့်ပါ..."
           autocomplete="off" autocorrect="off" spellcheck="false"
           onkeydown="if(event.key==='Enter')document.getElementById('pw-input').focus()"
           oninput="onFieldInput()">
    <span class="eye-btn" style="color:#4a5580;cursor:default;font-size:11px">@</span>
  </div>
  <div class="field" id="pw-field">
    <input type="password" id="pw-input" placeholder="Access Code ထည့်ပါ..."
           autocomplete="off" autocorrect="off" spellcheck="false"
           onkeydown="if(event.key==='Enter')doLogin()"
           oninput="onFieldInput()">
    <button class="eye-btn" onclick="toggleEye()" id="eye-btn">
      <i class="fa-solid fa-eye-slash" id="eye-icon"></i>
    </button>
  </div>

  <div class="status idle" id="status-msg">◈ AWAITING AUTHENTICATION</div>

  <button class="login-btn" onclick="doLogin(this)" id="login-btn">
    AUTHENTICATE
  </button>

  <p class="footer-note">AUTHORIZED ACCESS ONLY · v2.0</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" defer></script>
<script>
// ── CONFIG ─────────────────────────────────────────────────────────

// ── BG PARTICLE CANVAS ─────────────────────────────────────────────
const bgCvs = document.getElementById('bg');
const bgCtx = bgCvs.getContext('2d');
let W, H, particles = [];

function resizeBg() {
  W = bgCvs.width  = window.innerWidth;
  H = bgCvs.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * 2000, y: Math.random() * 2000,
    r: Math.random() * 1.2 + 0.3,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    a: Math.random(),
    c: Math.random() > 0.5 ? '157,78,221' : '0,229,255'
  });
}

function animBg() {
  bgCtx.clearRect(0, 0, W, H);
  // Grid
  bgCtx.strokeStyle = 'rgba(157,78,221,0.04)';
  bgCtx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x,H); bgCtx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(W,y); bgCtx.stroke();
  }
  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.a += 0.005;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    const alpha = (Math.sin(p.a) * 0.5 + 0.5) * 0.7;
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    bgCtx.fillStyle = `rgba(${p.c},${alpha})`;
    bgCtx.fill();
  });
  requestAnimationFrame(animBg);
}
animBg();

// ── ORB CANVAS (Three.js-style with Canvas API) ─────────────────────
const orb  = document.getElementById('orb');
const oCtx = orb.getContext('2d');
let orbT = 0;
let orbState = 'idle'; // idle | active | success | error

function drawOrb() {
  const cx = 48, cy = 48, r = 36;
  oCtx.clearRect(0, 0, 96, 96);

  // Color scheme by state
  const colors = {
    idle:    { core:'rgba(157,78,221,', rim:'rgba(0,229,255,' },
    active:  { core:'rgba(0,229,255,',  rim:'rgba(157,78,221,' },
    success: { core:'rgba(0,255,179,',  rim:'rgba(0,229,255,' },
    error:   { core:'rgba(255,77,141,', rim:'rgba(255,50,50,' }
  };
  const col = colors[orbState] || colors.idle;

  // Outer glow
  const pulse = Math.sin(orbT * 2) * 0.3 + 0.7;
  const glow = oCtx.createRadialGradient(cx, cy, r * 0.5, cx, cy, r * 1.8);
  glow.addColorStop(0,   col.core + (pulse * 0.3) + ')');
  glow.addColorStop(1,   'transparent');
  oCtx.beginPath();
  oCtx.arc(cx, cy, r * 1.8, 0, Math.PI * 2);
  oCtx.fillStyle = glow;
  oCtx.fill();

  // Core sphere gradient
  const grad = oCtx.createRadialGradient(cx - 8, cy - 10, 4, cx, cy, r);
  grad.addColorStop(0,   col.core + '0.9)');
  grad.addColorStop(0.5, col.rim  + '0.5)');
  grad.addColorStop(1,   'rgba(0,0,10,0.95)');
  oCtx.beginPath();
  oCtx.arc(cx, cy, r, 0, Math.PI * 2);
  oCtx.fillStyle = grad;
  oCtx.fill();

  // Rim highlight
  oCtx.beginPath();
  oCtx.arc(cx, cy, r, 0, Math.PI * 2);
  oCtx.strokeStyle = col.rim + (pulse * 0.6) + ')';
  oCtx.lineWidth = 1.5;
  oCtx.stroke();

  // Energy arcs
  for (let i = 0; i < 3; i++) {
    const angle = orbT * (1 + i * 0.4) + (i * Math.PI * 2 / 3);
    const arcR  = r * (0.55 + i * 0.1);
    const arcLen = Math.PI * (0.3 + Math.sin(orbT + i) * 0.1);
    oCtx.beginPath();
    oCtx.arc(cx, cy, arcR, angle, angle + arcLen);
    oCtx.strokeStyle = col.core + (0.4 + i * 0.15) + ')';
    oCtx.lineWidth   = 1;
    oCtx.stroke();
  }

  // Specular
  oCtx.beginPath();
  oCtx.ellipse(cx - 10, cy - 12, 6, 3, -Math.PI / 4, 0, Math.PI * 2);
  oCtx.fillStyle = 'rgba(255,255,255,0.2)';
  oCtx.fill();

  // Hologram ring
  oCtx.beginPath();
  oCtx.arc(cx, cy, r + 6, orbT * 0.5, orbT * 0.5 + Math.PI * 1.5);
  oCtx.strokeStyle = col.rim + '0.3)';
  oCtx.lineWidth = 1;
  oCtx.setLineDash([4, 6]);
  oCtx.stroke();
  oCtx.setLineDash([]);

  orbT += 0.04;
  requestAnimationFrame(drawOrb);
}
drawOrb();

// ── AUTH LOGIC ─────────────────────────────────────────────────────
function onFieldInput() {
  const email = document.getElementById('email-input')?.value || '';
  const pw    = document.getElementById('pw-input').value;
  orbState = (email.length > 0 || pw.length > 0) ? 'active' : 'idle';
  setStatus('◈ PROCESSING...', 'idle');
}

function toggleEye() {
  const inp  = document.getElementById('pw-input');
  const icon = document.getElementById('eye-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'fa-solid fa-eye';
  } else {
    inp.type = 'password';
    icon.className = 'fa-solid fa-eye-slash';
  }
}

function setStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className   = 'status ' + type;
}

async function doLogin(btn) {
  const email = document.getElementById('email-input')?.value?.trim() || '';
  const pw    = document.getElementById('pw-input').value;

  if (!email || !pw) {
    orbState = 'error';
    setStatus('◈ Email နှင့် Password ထည့်ပါ', 'err');
    const f = document.getElementById(!email ? 'email-field' : 'pw-field');
    f.classList.add('shake');
    setTimeout(() => f.classList.remove('shake'), 300);
    return;
  }

  orbState = 'active';
  setStatus('◈ AUTHENTICATING...', 'idle');
  const loginBtn = document.getElementById('login-btn');
  if (loginBtn) { loginBtn.disabled = true; loginBtn.style.opacity = '0.6'; }

  try {
    if (typeof db === 'undefined' || !db) throw new Error("DB not loaded");

    const { data, error } = await db.auth.signInWithPassword({ email, password: pw });
    if (error) throw error;

    // Verify is_admin flag
    const { data: uRow, error: uErr } = await db
      .from('users').select('is_admin').eq('id', data.user.id).single();
    if (uErr || !uRow?.is_admin) {
      await db.auth.signOut();
      throw new Error('Admin access only');
    }

    orbState = 'success';
    setStatus('◈ ACCESS GRANTED', 'ok');
    if (btn) addRipple(btn, event);
    setTimeout(() => { window.location.href = 'index.html'; }, 900);

  } catch(e) {
    orbState = 'error';
    const msg = e.message || 'Invalid credentials';    setStatus('◈ ACCESS DENIED — ' + msg, 'err');
    const field = document.getElementById('pw-field');
    field.classList.add('shake');
    setTimeout(() => field.classList.remove('shake'), 300);
    // Only clear password on actual auth failure (not on network/DB errors)
    if (!e.message?.includes('DB not loaded') && !e.message?.includes('fetch') && !e.message?.includes('network')) {
      document.getElementById('pw-input').value = '';
    }
    if (loginBtn) { loginBtn.disabled = false; loginBtn.style.opacity = '1'; }
    setTimeout(() => { orbState = 'idle'; }, 1500);
  }
}

function addRipple(btn, e) {
  const rect   = btn.getBoundingClientRect();
  const size   = Math.max(rect.width, rect.height);
  const x      = (e?.clientX || rect.left + rect.width / 2) - rect.left - size / 2;
  const y      = (e?.clientY || rect.top  + rect.height/ 2) - rect.top  - size / 2;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 500);
}

// ── SECURITY: disable right-click / copy / long-press select ────────
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('copy',  e => e.preventDefault());
document.addEventListener('cut',   e => e.preventDefault());
document.addEventListener('selectstart', e => { if (e.target.tagName !== 'INPUT') e.preventDefault(); });

// Auto-focus
document.getElementById('email-input')?.focus();
</script>
</body>
</html>
