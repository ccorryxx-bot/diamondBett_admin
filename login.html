<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Diamond-Bett | Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <style>
    body { background: #0a0a12; font-family: 'Segoe UI', system-ui, sans-serif; }
    .login-card {
      background: linear-gradient(145deg, #12121e, #1a1a2e);
      border: 1px solid rgba(157,78,221,0.25);
      border-radius: 20px;
      box-shadow: 0 0 60px rgba(157,78,221,0.08);
    }
    .inp {
      background: #0d0d1a;
      border: 1px solid rgba(157,78,221,0.25);
      border-radius: 10px;
      color: #e2e8f0;
      padding: 12px 16px;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    .inp:focus { border-color: rgba(157,78,221,0.7); }
    .inp::placeholder { color: #4a4a6a; }
    .btn-login {
      background: linear-gradient(135deg, #7c3aed, #9d4edd);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .err-msg {
      background: rgba(220,38,38,0.12);
      border: 1px solid rgba(220,38,38,0.3);
      color: #fca5a5;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      display: none;
    }
    .gem-glow {
      filter: drop-shadow(0 0 12px rgba(157,78,221,0.8));
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div class="login-card w-full max-w-sm p-8">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#9d4edd,#5c1ead);display:flex;align-items:center;justify-content:center;margin-bottom:16px">
        <svg class="gem-glow" width="28" height="28" viewBox="0 0 24 24" fill="white">
          <polygon points="12,2 22,8 22,16 12,22 2,16 2,8"/>
          <polygon points="12,2 17,8 12,14 7,8" fill="rgba(255,255,255,0.3)"/>
        </svg>
      </div>
      <h1 style="font-size:20px;font-weight:900;color:#e2e8f0;letter-spacing:0.1em">DIAMOND ADMIN</h1>
      <p style="font-size:11px;color:#6b6b8a;margin-top:4px">စီမံခန့်ခွဲမှု ဝင်ရောက်မည်</p>
    </div>

    <!-- Error message -->
    <div id="errMsg" class="err-msg mb-4">
      <i class="fa-solid fa-circle-exclamation mr-2"></i>
      <span id="errText">Login မအောင်မြင်ပါ</span>
    </div>

    <!-- Form -->
    <div class="space-y-4">
      <div>
        <label style="font-size:11px;color:#9d9dbd;font-weight:600;display:block;margin-bottom:6px">EMAIL</label>
        <input id="loginEmail" type="email" class="inp" placeholder="admin@example.com"
               onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div>
        <label style="font-size:11px;color:#9d9dbd;font-weight:600;display:block;margin-bottom:6px">PASSWORD</label>
        <input id="loginPass" type="password" class="inp" placeholder="••••••••"
               onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button id="loginBtn" class="btn-login mt-2" onclick="doLogin()">
        <i class="fa-solid fa-shield-halved mr-2"></i>ဝင်ရောက်မည်
      </button>
    </div>

    <p style="font-size:10px;color:#3a3a5a;text-align:center;margin-top:20px">
      Diamond-Bett Admin Panel &copy; 2026
    </p>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script>
    // Auto-redirect if already logged in
    (async function() {
      try {
        const { data: { session } } = await db.auth.getSession();
        if (session) {
          const { data: u } = await db.from('users').select('is_admin').eq('id', session.user.id).single();
          if (u && u.is_admin) { window.location.href = 'index.html'; return; }
          await db.auth.signOut();
        }
      } catch(e) {}
    })();

    async function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass  = document.getElementById('loginPass').value;
      const err   = document.getElementById('errMsg');
      const errT  = document.getElementById('errText');
      const btn   = document.getElementById('loginBtn');

      err.style.display = 'none';
      if (!email || !pass) {
        errT.textContent = 'Email နှင့် Password ဖြည့်ပါ';
        err.style.display = 'block'; return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>စစ်ဆေးနေသည်...';

      try {
        const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
        if (error) throw error;

        // Check is_admin flag
        const { data: u, error: ue } = await db.from('users')
          .select('is_admin, fullname')
          .eq('id', data.user.id)
          .single();

        if (ue || !u || !u.is_admin) {
          await db.auth.signOut();
          throw new Error('ဤ Account တွင် Admin ဝင်ခွင့် မရှိပါ');
        }

        window.location.href = 'index.html';
      } catch(e) {
        const raw = e.message || '';
        let msg;
        if (raw.includes('Invalid login') || raw.includes('invalid credentials')) {
          msg = 'Email သို့မဟုတ် Password မှားနေသည်';
        } else if (raw.includes('Admin')) {
          msg = e.message;
        } else if (raw.includes('fetch') || raw.includes('network')) {
          msg = 'ကွန်နက်ရှင် မကောင်းပါ';
        } else {
          msg = 'Login မအောင်မြင်ပါ — ထပ်ကြိုးစားပါ';
        }
        errT.textContent = msg;
        err.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-shield-halved mr-2"></i>ဝင်ရောက်မည်';
      }
    }
  </script>
</body>
</html>
